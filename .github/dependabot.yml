version: 2
updates:
  # Root npm/bun dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "@typescript-eslint/*"
      biome:
        patterns:
          - "@biomejs/*"
      types:
        patterns:
          - "@types/*"
          - "typescript"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
      mcp:
        patterns:
          - "@modelcontextprotocol/*"
          - "zod"
          - "glob"
    commit-message:
      prefix: "build(deps)"
      prefix-development: "build(deps-dev)"
    labels:
      - "dependencies"

  # GitHub Actions — keeps action versions pinned & current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
